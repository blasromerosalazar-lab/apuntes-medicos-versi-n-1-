name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Ajusta si tu rama principal tiene otro nombre

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }} # Opcional: si usas secretos

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # La carpeta que Vite genera
          branch: gh-pages # La rama donde se subirá el resultado compilado
